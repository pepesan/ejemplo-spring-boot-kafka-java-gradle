# Nombre de la aplicación — se usa como group-id del consumer de Kafka
spring:
  application:
    name: ejemplo-spring-boot-kafka-java-gradle

  kafka:
    # ─── OBLIGATORIO (producer y consumer) ────────────────────────────────────
    # Dirección del broker Kafka. Apunta al listener EXTERNAL del compose.yaml (puerto 9092 en localhost)
    bootstrap-servers: localhost:9092

    # ─── CONSUMER ─────────────────────────────────────────────────────────────
    consumer:
      # Identificador del grupo de consumers. Todos los consumers del mismo grupo se reparten las particiones
      group-id: ${spring.application.name}

      # Política de offset inicial: 'earliest' lee desde el principio del topic si no hay offset previo guardado.
      # Usar 'latest' para leer solo mensajes nuevos a partir del arranque
      auto-offset-reset: earliest

      # Las claves de los mensajes llegan como String
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # Los valores llegan como JSON y se deserializan automáticamente a la clase indicada abajo
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Clase destino para deserializar el valor del mensaje. Debe coincidir con la clase del producer
        # Para múltiples tipos se usa el header __TypeId__ que Spring Kafka incluye automáticamente
        spring.json.use.type.headers: true

    # ─── PRODUCER ─────────────────────────────────────────────────────────────
    producer:
      # Las claves se serializan como String
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      # Los valores se serializan a JSON automáticamente desde el objeto Java
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    # ─── STREAMS ──────────────────────────────────────────────────────────────────
    streams:
      # Identificador único de la aplicación Kafka Streams. Activa la auto-configuración de Spring Boot
      application-id: ${spring.application.name}-streams

    # ─── OBLIGATORIO (producer y consumer) cuando se usa JsonSerializer/Deserializer ──
    properties:
      # Paquetes de confianza para la deserialización JSON. Evita que se deserialicen clases arbitrarias
      spring.json.trusted.packages: "com.cursosdedesarrollo.ejemplospringbootkafkajavagradle.models"

# ─── BASE DE DATOS ────────────────────────────────────────────────────────────
  datasource:
    # H2 en memoria: los datos se pierden al reiniciar la aplicación.
    # Para persistencia en fichero usa: jdbc:h2:file:./data/kafka-events
    url: jdbc:h2:mem:kafkadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop    # crea el esquema al arrancar y lo borra al parar
    show-sql: false            # cambiar a true para ver las queries SQL en log
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      # Consola web de H2 disponible en http://localhost:8080/h2-console
      # JDBC URL: jdbc:h2:mem:kafkadb
      enabled: true
      path: /h2-console

# ─── ACTUATOR ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # Expone todos los endpoints del actuator: health, info, metrics, env, etc.
        # En producción limitar a los necesarios: "health,info"
        include: "*"